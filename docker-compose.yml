services:
  db:
    image: postgres:16
    container_name: postgres_flights
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flights
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_flights
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: fastapi_flights
    # use restart=unless-stopped or remove in dev so container isn't constantly reborn
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      # mount whole project so any code change (modules, routers, etc.) triggers reload
      - ./:/app
    environment:
      # make sure Python can import the package from /app
      - PYTHONPATH=/app
      # on Docker for Windows/Mac polling may be needed for filesystem events
      - WATCHGOD_USE_POLLING=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

volumes:
  postgres_data:
