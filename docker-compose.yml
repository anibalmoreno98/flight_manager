services:
  db:
    image: postgres:16
    container_name: postgres_flights
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: flights_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_flights
    restart: no
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_flights
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./:/app
    environment:
      - PYTHONPATH=/app
      - WATCHGOD_USE_POLLING=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

volumes:
  postgres_data:
